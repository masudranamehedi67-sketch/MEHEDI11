<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Science Lab — Dinajpur High School</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-page: #0B0C0E;
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-surface: rgba(255, 255, 255, 0.03);
      --accent-glow: rgba(249, 115, 22, 0.4);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg-page);
      color: #EDEDED;
    }

    /* Noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('https://grainy-gradients.vercel.app/noise.svg');
      opacity: 0.20;
      pointer-events: none;
      z-index: 9999;
    }

    /* Background grid */
    .bg-grid {
      background-size: 40px 40px;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
      mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
      -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); filter: blur(4px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    .fade-up { opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
    .delay-6 { animation-delay: 0.6s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float { animation: float 6s ease-in-out infinite; }
    .float-delay { animation: float 6s ease-in-out 2s infinite; }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    .pulse-ring { animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

    @keyframes orbit {
      from { transform: rotate(0deg) translateX(60px) rotate(0deg); }
      to { transform: rotate(360deg) translateX(60px) rotate(-360deg); }
    }
    .orbit { animation: orbit 8s linear infinite; }
    .orbit-reverse { animation: orbit 12s linear infinite reverse; }

    /* Glass card */
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transition: all 0.3s;
    }
    .glass-card:hover {
      border-color: rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.05);
    }

    /* Shine button */
    .shine-button {
      position: relative;
      overflow: hidden;
    }
    .shine-button::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: 0.5s;
    }
    .shine-button:hover::after { left: 100%; }

    /* Gradient text */
    .gradient-text {
      background: linear-gradient(to right, #fed7aa, #fb923c, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0B0C0E; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

    /* Tab active */
    .tab-btn.active {
      background: rgba(249, 115, 22, 0.15);
      border-color: rgba(249, 115, 22, 0.4);
      color: #FB923C;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 10000;
      transform: translateY(120%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .toast.show { transform: translateY(0); }

    /* Mobile menu */
    .mobile-menu {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .mobile-menu.open { max-height: 400px; }
  </style>
</head>
<body>

  <!-- Background Grid -->
  <div class="fixed inset-0 bg-grid pointer-events-none z-0"></div>

  <!-- Orange Glow -->
  <div class="fixed top-[-200px] left-1/2 -translate-x-1/2 w-[1000px] h-[400px] rounded-full pointer-events-none z-0" style="background: radial-gradient(ellipse, rgba(249,115,22,0.12), transparent 70%); filter: blur(120px);"></div>

  <!-- ========== NAVBAR ========== -->
  <nav class="fixed top-0 left-0 right-0 z-50 h-14 flex items-center px-6 border-b" style="background: rgba(11,12,14,0.8); backdrop-filter: blur(24px); border-color: var(--glass-border);">
    <div class="max-w-7xl mx-auto w-full flex items-center justify-between">
      <!-- Logo -->
      <a href="#" class="flex items-center gap-3">
        <img src="https://z-cdn-media.chatglm.cn/files/7ee38b80-5575-4d14-88f2-7309ca90074e.png?auth_key=1875843153-9c03fd3712984b2bb0877caf7a64d07b-0-b981a6afebb54833d74ceeaa1fa006c7" alt="DHS Science Club Logo" class="h-9 w-9 rounded-full object-contain" />
        <div class="flex flex-col">
          <span class="text-sm font-semibold tracking-tight text-white leading-none">Dinajpur High School</span>
          <span class="text-[10px] font-medium text-white/40 tracking-wider uppercase">Science Lab</span>
        </div>
      </a>

      <!-- Desktop Links -->
      <div class="hidden md:flex items-center gap-8">
        <a href="#facilities" class="text-[13px] text-white/60 hover:text-white transition-colors">Facilities</a>
        <a href="#experiments" class="text-[13px] text-white/60 hover:text-white transition-colors">Experiments</a>
        <a href="#safety" class="text-[13px] text-white/60 hover:text-white transition-colors">Safety</a>
        <a href="#schedule" class="text-[13px] text-white/60 hover:text-white transition-colors">Schedule</a>
        <a href="#gallery" class="text-[13px] text-white/60 hover:text-white transition-colors">Gallery</a>
      </div>

      <!-- CTA + Mobile Toggle -->
      <div class="flex items-center gap-3">
        <a href="#schedule" class="hidden md:inline-flex shine-button items-center gap-2 px-5 py-2 rounded-full text-[13px] font-medium text-black" style="background: #EBEBEB; box-shadow: 0 0 20px rgba(255,255,255,0.08);">
          <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
          Book Lab
        </a>
        <button id="mobileToggle" class="md:hidden p-2 rounded-lg hover:bg-white/5 transition-colors">
          <i data-lucide="menu" class="w-5 h-5 text-white/70"></i>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobileMenu" class="mobile-menu absolute top-14 left-0 right-0 border-b" style="background: rgba(11,12,14,0.95); backdrop-filter: blur(24px); border-color: var(--glass-border);">
      <div class="px-6 py-4 flex flex-col gap-3">
        <a href="#facilities" class="text-sm text-white/60 hover:text-white transition-colors py-2">Facilities</a>
        <a href="#experiments" class="text-sm text-white/60 hover:text-white transition-colors py-2">Experiments</a>
        <a href="#safety" class="text-sm text-white/60 hover:text-white transition-colors py-2">Safety</a>
        <a href="#schedule" class="text-sm text-white/60 hover:text-white transition-colors py-2">Schedule</a>
        <a href="#gallery" class="text-sm text-white/60 hover:text-white transition-colors py-2">Gallery</a>
        <a href="#schedule" class="shine-button inline-flex items-center justify-center gap-2 px-5 py-2.5 rounded-full text-sm font-medium text-black mt-2" style="background: #EBEBEB;">
          <i data-lucide="calendar" class="w-4 h-4"></i> Book Lab
        </a>
      </div>
    </div>
  </nav>


  <!-- ========== HERO ========== -->
  <section class="relative pt-32 pb-20 px-6 overflow-hidden">
    <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-16 items-center">
      <!-- Left -->
      <div class="flex flex-col gap-8">
        <div class="fade-up">
          <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border mb-6" style="border-color: rgba(249,115,22,0.3); background: rgba(249,115,22,0.08);">
            <span class="w-1.5 h-1.5 rounded-full bg-orange-400 pulse-ring"></span>
            <span class="text-[11px] font-medium uppercase tracking-wider text-orange-400">Class 9 & 10 — Science Lab</span>
          </div>
          <h1 class="text-5xl lg:text-7xl font-medium tracking-tight leading-[1.1]">
            Explore the<br />
            <span class="gradient-text">World of Science</span>
          </h1>
        </div>
        <p class="fade-up delay-1 text-lg font-light leading-relaxed text-white/60 max-w-lg">
          Dinajpur High School's state-of-the-art science laboratory provides hands-on learning experiences in Physics, Chemistry, and Biology for students of Class 9 and 10.
        </p>
        <div class="fade-up delay-2 flex flex-wrap gap-4">
          <a href="#experiments" class="shine-button inline-flex items-center gap-2 px-8 py-3 rounded-full text-[15px] font-medium text-black" style="background: #EBEBEB; box-shadow: 0 0 20px rgba(255,255,255,0.15);">
            <i data-lucide="flask-conical" class="w-4 h-4"></i>
            View Experiments
          </a>
          <a href="#facilities" class="inline-flex items-center gap-2 px-8 py-3 rounded-full text-[15px] font-medium text-white/80 border hover:bg-white/[0.04] transition-all" style="border-color: rgba(255,255,255,0.1);">
            <i data-lucide="microscope" class="w-4 h-4"></i>
            Lab Tour
          </a>
        </div>

        <!-- Stats -->
        <div class="fade-up delay-3 flex gap-10 mt-4">
          <div>
            <div class="text-2xl font-semibold text-white">50+</div>
            <div class="text-xs text-white/40 mt-1">Experiments</div>
          </div>
          <div>
            <div class="text-2xl font-semibold text-white">3</div>
            <div class="text-xs text-white/40 mt-1">Lab Rooms</div>
          </div>
          <div>
            <div class="text-2xl font-semibold text-white">200+</div>
            <div class="text-xs text-white/40 mt-1">Students Served</div>
          </div>
        </div>
      </div>

      <!-- Right — Atom illustration -->
      <div class="hidden lg:flex items-center justify-center relative">
        <div class="relative w-[360px] h-[360px] float">
          <!-- Central glow -->
          <div class="absolute inset-0 flex items-center justify-center">
            <div class="w-20 h-20 rounded-full" style="background: radial-gradient(circle, rgba(249,115,22,0.5), transparent 70%); filter: blur(20px);"></div>
          </div>
          <!-- Core -->
          <div class="absolute inset-0 flex items-center justify-center">
            <div class="w-16 h-16 rounded-full flex items-center justify-center" style="background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.4); box-shadow: 0 0 30px rgba(249,115,22,0.3);">
              <i data-lucide="atom" class="w-7 h-7 text-orange-400"></i>
            </div>
          </div>
          <!-- Orbits -->
          <div class="absolute inset-0 flex items-center justify-center">
            <div class="w-[280px] h-[280px] rounded-full border border-white/[0.06]" style="transform: rotateX(65deg);"></div>
          </div>
          <div class="absolute inset-0 flex items-center justify-center">
            <div class="w-[280px] h-[280px] rounded-full border border-white/[0.04]" style="transform: rotateX(65deg) rotateY(60deg);"></div>
          </div>
          <div class="absolute inset-0 flex items-center justify-center">
            <div class="w-[280px] h-[280px] rounded-full border border-white/[0.04]" style="transform: rotateX(65deg) rotateY(-60deg);"></div>
          </div>
          <!-- Orbiting electrons -->
          <div class="absolute inset-0 flex items-center justify-center" style="transform: rotateX(65deg);">
            <div class="orbit">
              <div class="w-3 h-3 rounded-full bg-orange-400" style="box-shadow: 0 0 10px rgba(249,115,22,0.8);"></div>
            </div>
          </div>
          <div class="absolute inset-0 flex items-center justify-center" style="transform: rotateX(65deg) rotateY(60deg);">
            <div class="orbit-reverse">
              <div class="w-2.5 h-2.5 rounded-full bg-blue-400" style="box-shadow: 0 0 10px rgba(96,165,250,0.8);"></div>
            </div>
          </div>
          <div class="absolute inset-0 flex items-center justify-center" style="transform: rotateX(65deg) rotateY(-60deg);">
            <div class="orbit" style="animation-duration: 10s;">
              <div class="w-2 h-2 rounded-full bg-emerald-400" style="box-shadow: 0 0 10px rgba(52,211,153,0.8);"></div>
            </div>
          </div>
          <!-- Labels -->
          <div class="absolute top-4 right-8 float-delay">
            <div class="glass-card px-3 py-1.5 rounded-lg">
              <span class="text-[10px] font-medium text-orange-400 uppercase tracking-wider">Physics</span>
            </div>
          </div>
          <div class="absolute bottom-8 left-4 float">
            <div class="glass-card px-3 py-1.5 rounded-lg">
              <span class="text-[10px] font-medium text-blue-400 uppercase tracking-wider">Chemistry</span>
            </div>
          </div>
          <div class="absolute bottom-16 right-0 float-delay">
            <div class="glass-card px-3 py-1.5 rounded-lg">
              <span class="text-[10px] font-medium text-emerald-400 uppercase tracking-wider">Biology</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>


  <!-- ========== FACILITIES ========== -->
  <section id="facilities" class="py-24 px-6 relative">
    <div class="max-w-7xl mx-auto">
      <!-- Section header -->
      <div class="text-center mb-16 fade-up">
        <span class="text-[11px] font-medium uppercase tracking-wider text-orange-400">Our Facilities</span>
        <h2 class="text-3xl md:text-4xl font-medium tracking-tight mt-3">Three Specialized Labs</h2>
        <p class="text-white/50 font-light mt-3 max-w-xl mx-auto">Each laboratory is equipped with modern instruments and safety equipment to support the SSC science curriculum.</p>
      </div>

      <div class="grid md:grid-cols-3 gap-6">
        <!-- Physics Lab -->
        <div class="glass-card rounded-2xl p-8 fade-up delay-1 group cursor-pointer">
          <div class="w-12 h-12 rounded-xl flex items-center justify-center mb-6" style="background: rgba(249,115,22,0.1); border: 1px solid rgba(249,115,22,0.2);">
            <i data-lucide="zap" class="w-6 h-6 text-orange-400"></i>
          </div>
          <h3 class="text-xl font-medium tracking-tight mb-3">Physics Lab</h3>
          <p class="text-white/50 font-light text-sm leading-relaxed mb-6">Equipped with optical benches, galvanometers, vernier calipers, prism sets, and electrical circuit modules for hands-on experimentation.</p>
          <div class="flex flex-wrap gap-2">
            <span class="text-[11px] px-2.5 py-1 rounded-full border text-white/50" style="border-color: rgba(255,255,255,0.08);">Optics</span>
            <span class="text-[11px] px-2.5 py-1 rounded-full border text-white/50" style="border-color: rgba(255,255,255,0.08);">Electricity</span>
            <span class="text-[11px] px-2.5 py-1 rounded-full border text-white/50" style="border-color: rgba(255,255,255,0.08);">Mechanics</span>
            <span class="text-[11px] px-2.5 py-1 rounded-full border text-white/50" style="border-color: rgba(255,255,255,0.08);">Sound</span>
          </div>
          <div class="mt-6 flex items-center gap-2 text-orange-400 text-sm font-medium opacity-0 group-hover:opacity-100 transition-opacity">
            <span>View Equipment</span>
            <i data-lucide="arrow-right" class="w-4 h-4"></i>
          </div>
        </div>

        <!-- Chemistry Lab -->
        <div class="glass-card rounded-2xl p-8 fade-up delay-2 group cursor-pointer">
          <div class="w-12 h-12 rounded-xl flex items-center justify-center mb-6" style="background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.2);">
            <i data-lucide="flask-conical" class="w-6 h-6 text-blue-400"></i>
          </div>
          <h3 class="text-xl font-medium tracking-tight mb-3">Chemistry Lab</h3>
          <p class="text-white/50 font-light text-sm leading-relaxed mb-6">Features fume hoods, burette stands, reagent shelves, boiling tube sets, and a complete range of chemicals for qualitative and quantitative analysis.</p>
          <div class="flex flex-wrap gap-2">
            <span class="text-[11px] px-2.5 py-1 rounded-full border text-white/50" style="border-color: rgba(255,255,255,0.08);">Acid-Base</span>
            <span class="text-[11px] px-2.5 py-1 rounded-full border text-white/50" style="border-color: rgba(255,255,255,0.08);">Titration</span>
            <span class="text-[11px] px-2.5 py-1 rounded-full border text-white/50" style="border-color: rgba(255,255,255,0.08);">Organic</span>
            <span class="text-[11px] px-2.5 py-1 rounded-full border text-white/50" style="border-color: rgba(255,255,255,0.08);">Periodic Table</span>
          </div>
          <div class="mt-6 flex items-center gap-2 text-blue-400 text-sm font-medium opacity-0 group-hover:opacity-100 transition-opacity">
            <span>View Equipment</span>
            <i data-lucide="arrow-right" class="w-4 h-4"></i>
          </div>
        </div>

        <!-- Biology Lab -->
        <div class="glass-card rounded-2xl p-8 fade-up delay-3 group cursor-pointer">
          <div class="w-12 h-12 rounded-xl flex items-center justify-center mb-6" style="background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.2);">
            <i data-lucide="leaf" class="w-6 h-6 text-emerald-400"></i>
          </div>
          <h3 class="text-xl font-medium tracking-tight mb-3">Biology Lab</h3>
          <p class="text-white/50 font-light text-sm leading-relaxed mb-6">Contains compound microscopes, prepared slides, dissecting kits, specimen jars, and models of human organ systems for biological studies.</p>
          <div class="flex flex-wrap gap-2">
            <span class="text-[11px] px-2.5 py-1 rounded-full border text-white/50" style="border-color: rgba(255,255,255,0.08);">Cell Biology</span>
            <span class="text-[11px] px-2.5 py-1 rounded-full border text-white/50" style="border-color: rgba(255,255,255,0.08);">Human Body</span>
            <span class="text-[11px] px-2.5 py-1 rounded-full border text-white/50" style="border-color: rgba(255,255,255,0.08);">Plant Anatomy</span>
            <span class="text-[11px] px-2.5 py-1 rounded-full border text-white/50" style="border-color: rgba(255,255,255,0.08);">Genetics</span>
          </div>
          <div class="mt-6 flex items-center gap-2 text-emerald-400 text-sm font-medium opacity-0 group-hover:opacity-100 transition-opacity">
            <span>View Equipment</span>
            <i data-lucide="arrow-right" class="w-4 h-4"></i>
          </div>
        </div>
      </div>
    </div>
  </section>


  <!-- ========== EXPERIMENTS ========== -->
  <section id="experiments" class="py-24 px-6 relative">
    <!-- Subtle glow -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full pointer-events-none" style="background: radial-gradient(ellipse, rgba(249,115,22,0.06), transparent 70%); filter: blur(100px);"></div>

    <div class="max-w-7xl mx-auto relative z-10">
      <div class="text-center mb-10 fade-up">
        <span class="text-[11px] font-medium uppercase tracking-wider text-orange-400">SSC Curriculum</span>
        <h2 class="text-3xl md:text-4xl font-medium tracking-tight mt-3">Lab Experiments</h2>
        <p class="text-white/50 font-light mt-3 max-w-xl mx-auto">Practical experiments mapped to the Class 9-10 SSC Science syllabus across all three disciplines.</p>
      </div>

      <!-- Tabs -->
      <div class="flex justify-center mb-10 fade-up delay-1">
        <div class="inline-flex gap-2 p-1.5 rounded-xl" style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);">
          <button class="tab-btn active px-5 py-2 rounded-lg text-[13px] font-medium transition-all border border-transparent" data-tab="physics">Physics</button>
          <button class="tab-btn px-5 py-2 rounded-lg text-[13px] font-medium text-white/50 transition-all border border-transparent hover:text-white/80" data-tab="chemistry">Chemistry</button>
          <button class="tab-btn px-5 py-2 rounded-lg text-[13px] font-medium text-white/50 transition-all border border-transparent hover:text-white/80" data-tab="biology">Biology</button>
        </div>
      </div>

      <!-- Tab Content -->
      <div class="fade-up delay-2">
        <!-- Physics -->
        <div id="tab-physics" class="tab-content">
          <div class="grid md:grid-cols-2 gap-4">
            <div class="glass-card rounded-xl p-6 flex gap-4">
              <div class="w-10 h-10 rounded-lg flex-shrink-0 flex items-center justify-center text-sm font-semibold" style="background: rgba(249,115,22,0.1); color: #FB923C;">01</div>
              <div>
                <h4 class="text-sm font-medium mb-1">Verify Ohm's Law</h4>
                <p class="text-xs text-white/40 leading-relaxed">Measure voltage and current using a rheostat to establish V = IR relationship.</p>
                <span class="inline-block mt-2 text-[10px] px-2 py-0.5 rounded bg-orange-500/10 text-orange-400">Class 9</span>
              </div>
            </div>
            <div class="glass-card rounded-xl p-6 flex gap-4">
              <div class="w-10 h-10 rounded-lg flex-shrink-0 flex items-center justify-center text-sm font-semibold" style="background: rgba(249,115,22,0.1); color: #FB923C;">02</div>
              <div>
                <h4 class="text-sm font-medium mb-1">Determine Focal Length of Convex Lens</h4>
                <p class="text-xs text-white/40 leading-relaxed">Use distant object method and lens formula to find the focal length.</p>
                <span class="inline-block mt-2 text-[10px] px-2 py-0.5 rounded bg-orange-500/10 text-orange-400">Class 10</span>
              </div>
            </div>
            <div class="glass-card rounded-xl p-6 flex gap-4">
              <div class="w-10 h-10 rounded-lg flex-shrink-0 flex items-center justify-center text-sm font-semibold" style="background: rgba(249,115,22,0.1); color: #FB923C;">03</div>
              <div>
                <h4 class="text-sm font-medium mb-1">Find the Density of an Irregular Solid</h4>
                <p class="text-xs text-white/40 leading-relaxed">Use a eureka can and measuring cylinder for volume displacement method.</p>
