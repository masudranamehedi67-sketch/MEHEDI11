  <!-- Toast -->
  <div id="toast" class="toast">
    <div class="glass-card rounded-xl px-5 py-3.5 flex items-center gap-3 max-w-sm" style="border-color: rgba(249,115,22,0.3); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
      <div class="w-8 h-8 rounded-lg flex-shrink-0 flex items-center justify-center" style="background: rgba(249,115,22,0.15);">
        <i data-lucide="info" class="w-4 h-4 text-orange-400"></i>
      </div>
      <p id="toastMessage" class="text-sm text-white/80"></p>
    </div>
  </div>


  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Mobile menu toggle
    const mobileToggle = document.getElementById('mobileToggle');
    const mobileMenu = document.getElementById('mobileMenu');
    let menuOpen = false;
    mobileToggle.addEventListener('click', () => {
      menuOpen = !menuOpen;
      mobileMenu.classList.toggle('open', menuOpen);
    });

    // Close mobile menu on link click
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        menuOpen = false;
        mobileMenu.classList.remove('open');
      });
    });

    // Tab switching
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        tabBtns.forEach(b => {
          b.classList.remove('active');
          b.classList.add('text-white/50');
        });
        btn.classList.add('active');
        btn.classList.remove('text-white/50');
        tabContents.forEach(c => c.classList.add('hidden'));
        document.getElementById('tab-' + tab).classList.remove('hidden');
      });
    });

    // Toast
    function showToast(message) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMessage');
      toastMsg.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    // Scroll-triggered fade-up animation
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.style.animationPlayState = 'running';
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fade-up').forEach(el => {
      el.style.animationPlayState = 'paused';
      observer.observe(el);
    });

    // Re-trigger icons after DOM update
    setTimeout(() => lucide.createIcons(), 100);
  </script>
