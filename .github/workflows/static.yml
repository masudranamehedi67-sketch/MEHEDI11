              <div>
                <h4 class="text-sm font-medium mb-1">Test for Carbon Dioxide</h4>
                <p class="text-xs text-white/40 leading-relaxed">Pass CO₂ through limewater and observe the milky appearance confirming its presence.</p>
                <span class="inline-block mt-2 text-[10px] px-2 py-0.5 rounded bg-blue-500/10 text-blue-400">Class 9</span>
              </div>
            </div>
            <div class="glass-card rounded-xl p-6 flex gap-4">
              <div class="w-10 h-10 rounded-lg flex-shrink-0 flex items-center justify-center text-sm font-semibold" style="background: rgba(96,165,250,0.1); color: #60A5FA;">03</div>
              <div>
                <h4 class="text-sm font-medium mb-1">Preparation of Hydrogen Gas</h4>
                <p class="text-xs text-white/40 leading-relaxed">React zinc granules with dilute H₂SO₄ and collect gas by downward displacement of water.</p>
                <span class="inline-block mt-2 text-[10px] px-2 py-0.5 rounded bg-blue-500/10 text-blue-400">Class 9</span>
              </div>
            </div>
            <div class="glass-card rounded-xl p-6 flex gap-4">
              <div class="w-10 h-10 rounded-lg flex-shrink-0 flex items-center justify-center text-sm font-semibold" style="background: rgba(96,165,250,0.1); color: #60A5FA;">04</div>
              <div>
                <h4 class="text-sm font-medium mb-1">Identification of Ions</h4>
                <p class="text-xs text-white/40 leading-relaxed">Perform flame test and precipitation reactions to identify cations and anions in given salts.</p>
                <span class="inline-block mt-2 text-[10px] px-2 py-0.5 rounded bg-blue-500/10 text-blue-400">Class 10</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Biology -->
