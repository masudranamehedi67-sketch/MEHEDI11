              <div>
                <h4 class="text-sm font-medium mb-1">Acid-Base Titration</h4>
                <p class="text-xs text-white/40 leading-relaxed">Standardize HCl solution using Na₂CO₃ as primary standard with methyl orange indicator.</p>
                <span class="inline-block mt-2 text-[10px] px-2 py-0.5 rounded bg-blue-500/10 text-blue-400">Class 10</span>
              </div>
            </div>
            <div class="glass-card rounded-xl p-6 flex gap-4">
