              <div>
                <h4 class="text-sm font-medium mb-1">Study of Plant Cells (Onion Peel)</h4>
                <p class="text-xs text-white/40 leading-relaxed">Prepare temporary mount and observe cell wall, nucleus, and cytoplasm under compound microscope.</p>
                <span class="inline-block mt-2 text-[10px] px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400">Class 9</span>
              </div>
            </div>
            <div class="glass-card rounded-xl p-6 flex gap-4">
              <div class="w-10 h-10 rounded-lg flex-shrink-0 flex items-center justify-center text-sm font-semibold" style="background: rgba(52,211,153,0.1); color: #34D399;">02</div>
              <div>
                <h4 class="text-sm font-medium mb-1">Human Cheek Cell Observation</h4>
                <p class="text-xs text-white/40 leading-relaxed">Scrape cheek lining, stain with methylene blue, and observe the animal cell structure.</p>
                <span class="inline-block mt-2 text-[10px] px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400">Class 9</span>
              </div>
            </div>
            <div class="glass-card rounded-xl p-6 flex gap-4">
              <div class="w-10 h-10 rounded-lg flex-shrink-0 flex items-center justify-center text-sm font-semibold" style="background: rgba(52,211,153,0.1); color: #34D399;">03</div>
              <div>
                <h4 class="text-sm font-medium mb-1">Demonstration of Osmosis</h4>
                <p class="text-xs text-white/40 leading-relaxed">Use a thistle funnel with parchment paper to show osmosis with sugar solution.</p>
                <span class="inline-block mt-2 text-[10px] px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400">Class 10</span>
              </div>
            </div>
            <div class="glass-card rounded-xl p-6 flex gap-4">
