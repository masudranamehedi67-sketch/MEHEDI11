              <div>
                <h4 class="text-sm font-medium mb-1">Image Formation by Concave Mirror</h4>
                <p class="text-xs text-white/40 leading-relaxed">Observe real and virtual images at different object distances using candle setup.</p>
                <span class="inline-block mt-2 text-[10px] px-2 py-0.5 rounded bg-orange-500/10 text-orange-400">Class 10</span>
              </div>
            </div>
          </div>
