              <div>
                <h4 class="text-sm font-medium mb-1">Study of Human Heart Model</h4>
                <p class="text-xs text-white/40 leading-relaxed">Identify chambers, valves, and major blood vessels using the dissectible heart model.</p>
                <span class="inline-block mt-2 text-[10px] px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400">Class 10</span>
